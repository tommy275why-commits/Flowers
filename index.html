<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flower Shop</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f1f1; color: #333; }
        header { background-color: #ffb7b2; padding: 20px; }
        .flower-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .flower-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to Bloom Boutique 🌸</h1>
        <p>The freshest flowers, picked just for you.</p>
    </header>

    <main>
        <h2>Our Best Sellers</h2>
        <div class="flower-container">
            <div class="flower-card">
                <h3>Red Roses 🌹</h3>
                <p>$15.00 a dozen</p>
            </div>
            <div class="flower-card">
                <h3>Sunflowers 🌻</h3>
                <p>$12.00 a bunch</p>
            </div>
            <div class="flower-card">
                <h3>Tulips 🌷</h3>
                <p>$10.00 a bunch</p>
            </div>
        </div>
    </main>

</body>
</html>
